name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install black isort pylint bandit

    - name: Check formatting with black
      run: black --check backend || true

    - name: Check import sorting with isort
      run: isort --check-only backend || true

    - name: Lint with pylint
      run: |
        pylint backend/app backend/routers backend/utils --exit-zero || true

    - name: Security check with bandit
      run: |
        bandit -r backend -ll --exit-zero || true

    - name: Check for common security issues
      run: |
        pip install semgrep || true
        semgrep --config p/security-audit backend || true
