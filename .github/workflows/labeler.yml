name: Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  issues:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Label PRs by size
        uses: actions/github-script@v9
        with:
          script: |
            const { data: { additions, deletions } } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            let size = 'small';
            if (additions + deletions > 100 && additions + deletions <= 500) size = 'medium';
            if (additions + deletions > 500) size = 'large';
            
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [size]
            });
